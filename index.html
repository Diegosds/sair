<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite Especial</title>
<style>
    body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background: linear-gradient(to right, #ff9a9e, #fad0c4);
        overflow: hidden;
    }

    .container {
        text-align: center;
        background: rgba(255, 255, 255, 0.9);
        padding: 50px;
        border-radius: 20px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        position: relative;
        z-index: 1;
        transition: opacity 0.3s ease;
    }

    .buttons {
        display: flex;
        justify-content: center;
        gap: 30px;
        margin-top: 30px;
        position: relative;
        height: 60px;
    }

    button {
        padding: 10px 30px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        position: relative;
    }

    #yes {
        background-color: #4caf50;
        color: white;
    }

    #no {
        background-color: #f44336;
        color: white;
    }

    /* Estilos do banner (para o Sim) */
    .banner {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.8);
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }

    .banner-content {
        position: relative;
        max-width: 80%;
        max-height: 80%;
    }

    .banner-content img {
        width: 100%;
        height: auto;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(255,255,255,0.3);
    }

    .close-btn {
        position: absolute;
        top: -40px;
        right: 0;
        background: white;
        border: none;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        font-size: 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .close-btn:hover {
        background: #f0f0f0;
    }

    /* Estilos da tela de castigo (para o Não) */
    .punishment-screen {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
        justify-content: center;
        align-items: center;
        z-index: 2000;
        animation: fadeIn 0.3s ease;
    }

    .punishment-content {
        text-align: center;
        color: white;
    }

    .punishment-content img {
        max-width: 80vw;
        max-height: 70vh;
        border-radius: 10px;
        box-shadow: 0 0 30px rgba(255,0,0,0.3);
    }

    .punishment-content p {
        font-size: 24px;
        margin-top: 20px;
        font-weight: bold;
        color: #ff6b6b;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .container.hidden {
        opacity: 0;
        pointer-events: none;
    }
</style>
</head>
<body>
<div class="container" id="container">
    <h1>Quer sair comigo?</h1>
    <div class="buttons">
        <button id="yes">Sim 🐕😊</button>
        <button id="no">Não 🐕‍🦺😡</button>
    </div>
</div>

<!-- Banner para o Sim -->
<div class="banner" id="banner">
    <div class="banner-content">
        <button class="close-btn" id="closeBanner">&times;</button>
        <!-- ALTERE O CAMINHO DA IMAGEM DO SIM -->
        <img src="xj.png" alt="Imagem especial">
    </div>
</div>

<!-- Tela de castigo para o Não -->
<div class="punishment-screen" id="punishmentScreen">
    <div class="punishment-content">
        <!-- ALTERE O CAMINHO DA IMAGEM DO NÃO -->
        <img src="laser.png" alt="Imagem de castigo">
        <p>Olhe para o laser 😈</p>
    </div>
</div>

<script>
const noBtn = document.getElementById('no');
const yesBtn = document.getElementById('yes');
const container = document.getElementById('container');
const banner = document.getElementById('banner');
const closeBtn = document.getElementById('closeBanner');
const punishmentScreen = document.getElementById('punishmentScreen');

let currentX = 0;
let currentY = 0;
let punishmentTimeout;
let isPunished = false;

// Evento do botão Sim - mostra o banner
yesBtn.addEventListener('click', () => {
    if (!isPunished) {
        banner.style.display = 'flex';
    }
});

// Evento para fechar o banner
closeBtn.addEventListener('click', () => {
    banner.style.display = 'none';
});

// Fecha o banner se clicar fora da imagem
banner.addEventListener('click', (e) => {
    if (e.target === banner) {
        banner.style.display = 'none';
    }
});

// Evento do botão Não - mostra castigo e reinicia
noBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!isPunished) {
        // Mostra a tela de castigo
        punishmentScreen.style.display = 'flex';
        container.classList.add('hidden');
        isPunished = true;
        
        // Reseta a posição do botão Não
        currentX = 0;
        currentY = 0;
        noBtn.style.transform = 'translate(0, 0)';
        
        // Limpa timeout anterior se existir
        if (punishmentTimeout) {
            clearTimeout(punishmentTimeout);
        }
        
        // Após 2 segundos, volta ao normal
        punishmentTimeout = setTimeout(() => {
            punishmentScreen.style.display = 'none';
            container.classList.remove('hidden');
            isPunished = false;
        }, 2000);
    }
});

// Código ORIGINAL do botão Não (exatamente como estava)
noBtn.style.position = 'relative';

document.addEventListener('mousemove', (e) => {
    if (isPunished) return; // Só adicionei esta linha para não fugir durante o castigo
    
    const rect = noBtn.getBoundingClientRect();
    const mouseX = e.clientX;
    const mouseY = e.clientY;

    const offset = 100; // distância mínima do mouse (VOLTEI PARA 100)

    // Calcula a distância do mouse ao centro do botão
    const dx = rect.left + rect.width/2 - mouseX;
    const dy = rect.top + rect.height/2 - mouseY;
    const distance = Math.sqrt(dx*dx + dy*dy);

    if(distance < offset) {
        // Desvia proporcionalmente
        let moveX = (dx / distance) * 100;
        let moveY = (dy / distance) * 100;

        // Atualiza posição relativa
        currentX += moveX;
        currentY += moveY;

        // Limita para não sair da tela
        const maxX = window.innerWidth - rect.width;
        const maxY = window.innerHeight - rect.height;

        const btnLeft = rect.left + currentX;
        const btnTop = rect.top + currentY;

        if(btnLeft < 0) currentX = -rect.left;
        if(btnTop < 0) currentY = -rect.top;
        if(btnLeft > maxX) currentX = maxX - rect.left;
        if(btnTop > maxY) currentY = maxY - rect.top;

        noBtn.style.transform = `translate(${currentX}px, ${currentY}px)`;
    }
});

// Reinicia posição se necessário
window.addEventListener('resize', () => {
    currentX = 0;
    currentY = 0;
    noBtn.style.transform = 'translate(0, 0)';
});
</script>
</body>
</html>
